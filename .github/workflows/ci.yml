name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Semifinal verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      FORCE_COLOR: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Compile local contracts
        run: npm run contract:compile

      - name: Test local contracts
        run: npm run contract:test

      - name: Upload local-node diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-node-diagnostics
          path: |
            artifacts/contract-node.log
            artifacts/wdk-contract-node.log
          if-no-files-found: warn

      - name: Generate WDK policy proof
        run: npm run wdk:policy-demo:json

      - name: Check generated browser proof fixture
        run: npm run guarded-proof:check

      - name: Generate local WDK contract proof
        run: npm run wdk:contract-demo:json

      - name: Check generated contract proof fixture
        run: npm run contract-proof:check

      - name: Upload sanitized proofs
        uses: actions/upload-artifact@v4
        with:
          name: semifinal-proofs
          path: |
            artifacts/wdk-policy-proof.json
            artifacts/wdk-contract-proof.json
          if-no-files-found: error
