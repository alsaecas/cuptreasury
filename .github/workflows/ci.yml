name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Semifinal verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Run WDK smoke proof
        run: npm run wdk:smoke

      - name: Run WDK policy proof
        run: npm run wdk:policy-demo:json

      - name: Upload sanitized WDK proofs
        uses: actions/upload-artifact@v4
        with:
          name: wdk-semifinal-proofs
          path: |
            artifacts/wdk-smoke-proof.json
            artifacts/wdk-policy-proof.json
          if-no-files-found: error
