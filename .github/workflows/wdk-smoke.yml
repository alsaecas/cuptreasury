name: WDK Smoke Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: WDK SDK smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run WDK smoke test
        run: npm run wdk:smoke

      - name: Run WDK policy proof
        run: npm run wdk:policy-demo:json

      - name: Generate proof manifest
        run: npm run proof:manifest

      - name: Upload sanitized WDK proofs
        uses: actions/upload-artifact@v4
        with:
          name: wdk-smoke-and-policy-proofs
          path: |
            artifacts/wdk-smoke-proof.json
            artifacts/wdk-policy-proof.json
            artifacts/proof-manifest.json
          if-no-files-found: error
